version: 2
updates:
  # Keep npm dependencies up to date.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # Collapse low-risk updates into a single PR to cut review noise; surface
    # major bumps individually since they may carry breaking changes.
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep the GitHub Actions used in workflows up to date too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
