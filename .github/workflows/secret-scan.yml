name: Secret Scan

# Fails the check if any credentials/secrets are detected, so they can't be
# merged. Runs on every PR and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so pushes scan every new commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for GitHub Organization accounts.
          # This repo is under a personal account, so no license is needed.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
