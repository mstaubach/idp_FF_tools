name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # npm ci would be preferable but @emnapi platform-specific optional packages
        # differ between macOS (dev) and Linux (CI), making a cross-platform lock file
        # impossible to generate from macOS. Risk accepted: no deploy step, no secrets.
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
